<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make a Note - SQL Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/note.css">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
</head>
<body>
    <div class="menu" id="menu">
        <button id="menu-btn" class="menu-btn"></button>
    </div>
    <div class="overlay"></div>
    <div class="menu-items">
        <div class="app">
            <p class="nav-label"><span>Main Features</span></p>
            <button class="p-button" id="sql-view-btn">SQL View</button>
            <button id="make-note-btn" class="heighlight p-button">Make a note</button>
        </div>
        <div class="service">
            <p class="nav-label"><span>Preferences</span></p>
            <button class="p-button" id="about">about</button>
            <button class="p-button" id="help">help</button>
        </div>
    </div>

    <main class="container">

        <header>
            <h1 class="logo">SQL Viewer from <span class="accent">Motion Mind</span></h1>
            <p class="subtitle">Minimalist SQLite Viewer & Note Engine</p>
        </header>
        <div class="download-info">
            <p>Write your notes here...</p>
            <button id="download-btn"></button>
        </div>
        <section class="grid">
            <textarea id="note-area" class="note-area" placeholder="Write your notes here..."></textarea>
        </section>
    </main>

    <script type="module" src="./js/style.js"></script>
    <script type="module" src="./js/note.js"></script>
</body>
</html>
